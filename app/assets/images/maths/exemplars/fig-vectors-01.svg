  </defs>
  <g fill="none" stroke="currentColor" stroke-width="2" color="#0f172a">
    <line x1="40" y1="130" x2="190" y2="60" marker-end="url(#arrow)"/>
    <line x1="40" y1="130" x2="150" y2="135" marker-end="url(#arrow)"/>
    <path d="M 72 122 A 30 30 0 0 0 72 130" stroke="#475569" fill="none"/>
  </g>
  <g font-family="Libertinus Serif, Georgia, serif" font-style="italic" font-size="14" fill="#0f172a">
