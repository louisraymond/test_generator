name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Non-selenium specs. Gates the deploy. Fast (~2 min target).
    # Selenium-driven system specs run AFTER deploy as a canary — they do
    # not block prod going out.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exam_generator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/exam_generator_test
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

    steps:
      - uses: actions/checkout@v6

      - name: Install Chromium
        # Some non-system specs still touch Grover/puppeteer for PDF rendering.
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.9'
          bundler-cache: true

      - name: Install puppeteer
        run: npm install --omit=dev

      - name: Setup database
        run: bin/rails db:schema:load

      - name: Run non-system specs (deploy gate)
        run: |
          # Run every spec dir that exists EXCEPT spec/system (selenium).
          # spec/support, spec/factories, spec/fixtures aren't spec dirs.
          DIRS=$(ls -d spec/*/ 2>/dev/null \
            | grep -vE 'spec/(system|support|factories|fixtures)/?$' \
            | xargs)
          if [ -z "$DIRS" ]; then
            echo "No non-system spec dirs found — failing loud."
            exit 1
          fi
          echo "Running: $DIRS"
          bundle exec rspec $DIRS

      - name: Security audit
        continue-on-error: true
        run: |
          gem install bundler-audit
          bundle audit check --update

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      previous_sha: ${{ steps.capture_prev.outputs.sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # need HEAD~1 for rollback target

      - name: Capture previous SHA for potential rollback
        id: capture_prev
        run: |
          PREV=$(git rev-parse HEAD~1)
          echo "Previous SHA: $PREV"
          echo "sha=$PREV" >> "$GITHUB_OUTPUT"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.9'
          bundler-cache: true

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Kamal secrets
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets <<EOF
          KAMAL_REGISTRY_PASSWORD=${{ secrets.DOCKERHUB_TOKEN }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AUTH_USER=${{ secrets.AUTH_USER }}
          AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

      - name: Deploy with Kamal
        run: |
          gem install kamal
          kamal deploy

  smoke:
    # Post-deploy canary that hits the *actual deployed instance* over
    # HTTP. Replaces the previous selenium-driven canary which was
    # flaking on pre-existing CodeMirror UI specs and triggering bogus
    # rollbacks. This is faster, more reliable, and verifies what users
    # actually see (the deployed app, not a fresh test bundle).
    #
    # Failure here triggers the rollback job below.
    name: Post-deploy HTTP smoke
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Curl-based smoke check
        env:
          AUTH_USER: ${{ secrets.AUTH_USER }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          BASE: https://selftesting.louisraymond.com
        run: |
          set -euo pipefail
          AUTH="${AUTH_USER}:${AUTH_PASSWORD}"

          check() {
            local label="$1" url="$2" needle="$3"
            local resp code
            # -L follows redirects (root may 301 to /topics for auth users);
            # -f makes 4xx/5xx fail loudly so we never treat an error page as
            # "smoke passed" just because grep happened to match.
            resp=$(curl -fLsS -u "$AUTH" "$url" -w '\n%{http_code}\n')
            # Use here-strings instead of `echo "$resp" | …`. `grep -q` exits
            # the moment it finds the needle, which closes the pipe; the
            # upstream `echo` then gets SIGPIPE and exits 141, and `set -o
            # pipefail` propagates that as a pipeline failure — false-
            # positive "marker missing". A here-string redirects the variable
            # without spawning a pipe, so SIGPIPE never enters the picture.
            code=$(tail -n1 <<< "$resp")
            if [ "$code" != "200" ]; then
              echo "::error::$label returned HTTP $code"
              return 1
            fi
            if ! grep -q "$needle" <<< "$resp"; then
              echo "::error::$label rendered but missing marker: $needle"
              return 1
            fi
            echo "  ok: $label ($code, marker present)"
          }

          echo "Smoke against $BASE..."
          # Skip the root page — it 301's to a route that depends on
          # the user's last-visited surface; the topic detail page is
          # the meaningful canary. Add /topics back as a stable index
          # check.
          check "/topics"        "$BASE/topics"                  "Topics"
          # V2 is the default — the topic detail page must ship the V2
          # wrapper, heat-map, and module-card markup with no flag.
          check "/topics/29"     "$BASE/topics/29"               "topic-detail-v2"
          check "v2 heatmap"     "$BASE/topics/29"               "topic-heatmap"
          check "v2 module"      "$BASE/topics/29"               "topic-module"
          # Legacy chrome stays reachable behind ?legacy=1 until we delete it.
          check "legacy chrome"  "$BASE/topics/29?legacy=1"      "modules-grid"
          echo "Smoke OK."

  rollback:
    # Only fires if the deploy succeeded but the post-deploy canary failed.
    # Pushes the previous SHA back via Kamal.
    name: Rollback on smoke failure
    needs: [deploy, smoke]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      needs.smoke.result == 'failure' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.9'
          bundler-cache: true

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Generate Kamal secrets
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets <<EOF
          KAMAL_REGISTRY_PASSWORD=${{ secrets.DOCKERHUB_TOKEN }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AUTH_USER=${{ secrets.AUTH_USER }}
          AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

      - name: Roll back to previous SHA via Kamal
        env:
          PREVIOUS_SHA: ${{ needs.deploy.outputs.previous_sha }}
        run: |
          gem install kamal
          if [ -z "$PREVIOUS_SHA" ]; then
            echo "::error::No previous SHA available; cannot rollback automatically."
            exit 1
          fi
          echo "Rolling back to $PREVIOUS_SHA"
          kamal app rollback "$PREVIOUS_SHA"
