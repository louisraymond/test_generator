name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exam_generator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/exam_generator_test
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

    steps:
      - uses: actions/checkout@v4

      - name: Install Chromium
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.9'
          bundler-cache: true

      - name: Install puppeteer
        run: npm install --omit=dev

      - name: Setup database
        run: bin/rails db:schema:load

      - name: Run tests
        run: bundle exec rspec

      - name: Security audit
        continue-on-error: true
        run: |
          gem install bundler-audit
          bundle audit check --update

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.9'
          bundler-cache: true

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Kamal secrets
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets <<EOF
          KAMAL_REGISTRY_PASSWORD=${{ secrets.DOCKERHUB_TOKEN }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AUTH_USER=${{ secrets.AUTH_USER }}
          AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

      - name: Deploy with Kamal
        run: |
          gem install kamal
          kamal deploy
